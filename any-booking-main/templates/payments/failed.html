{% extends 'base.html' %}
{% block title %}Payment Failed{% endblock %}

{% block content %}
<div class="container my-5" style="max-width:560px">
  <div class="card border-0 shadow rounded-4 p-4 p-md-5 text-center">
    <div class="display-3 text-danger mb-3"><i class="bi bi-x-circle-fill"></i></div>
    <h2 class="fw-bold">Payment Failed</h2>
    <p class="text-muted mb-4">
      Something went wrong while processing your payment. Your booking request is still saved.
    </p>
    <div class="d-grid gap-2">
      <a href="{% url 'initiate_payment' payment.booking.pk %}" class="btn btn-primary btn-lg">
        <i class="bi bi-arrow-clockwise"></i> Try Again
      </a>
      <a href="{% url 'booking_confirmation' payment.booking.pk %}" class="btn btn-outline-secondary">
        View Booking
      </a>
    </div>
  </div>
</div>
{% endblock %}
