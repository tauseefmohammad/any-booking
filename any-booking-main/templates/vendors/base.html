<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Vendor Portal{% endblock %} — AnyBooking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  {% load static %}
  <link href="{% static 'css/main.css' %}" rel="stylesheet">
  <style>
    body { background: #f3f4f6; }
    .vendor-sidebar {
      min-height: 100vh;
      background: #1a1a2e;
      color: #e2e8f0;
      width: 220px;
      flex-shrink: 0;
    }
    .vendor-sidebar .brand {
      padding: 1.4rem 1.2rem 1rem;
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #94a3b8;
      border-bottom: 1px solid #2d3748;
    }
    .vendor-sidebar .vendor-name {
      padding: .8rem 1.2rem;
      font-weight: 600;
      font-size: .95rem;
      color: #fff;
      border-bottom: 1px solid #2d3748;
      word-break: break-word;
    }
    .vendor-sidebar .nav-link {
      color: #94a3b8;
      padding: .6rem 1.2rem;
      font-size: .88rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      border-radius: 0;
      transition: background .15s, color .15s;
    }
    .vendor-sidebar .nav-link:hover,
    .vendor-sidebar .nav-link.active {
      background: #2d3748;
      color: #fff;
    }
    .vendor-main { flex: 1; min-width: 0; padding: 2rem; }
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; color: #1a1a2e; }
    .stat-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
      padding: 1rem 1.25rem; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 4px; height: 100%; background: var(--accent, #2563eb);
    }
    .stat-card .label { font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #111; line-height: 1.1; margin: .2rem 0 .1rem; }
    .card-blue  { --accent: #2563eb; }
    .card-green { --accent: #16a34a; }
    .card-orange{ --accent: #d97706; }
    .v-table-wrap {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
      overflow: hidden; margin-bottom: 1.5rem;
    }
    .v-table-wrap .v-table-head {
      padding: .85rem 1.2rem; font-size: .85rem; font-weight: 600;
      background: #f9fafb; border-bottom: 1px solid #e5e7eb; color: #374151;
    }
    .v-table { width: 100%; border-collapse: collapse; font-size: .83rem; }
    .v-table th { text-align: left; padding: .55rem 1rem; font-size: .72rem;
      text-transform: uppercase; letter-spacing: .05em; color: #6b7280;
      background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
    .v-table td { padding: .6rem 1rem; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
    .v-table tr:last-child td { border-bottom: none; }
    .v-table tr:hover td { background: #fafafa; }
    .badge-pending   { background: #fef3c7; color: #92400e; }
    .badge-confirmed { background: #d1fae5; color: #065f46; }
    .badge-cancelled { background: #fee2e2; color: #991b1b; }
    .badge-completed { background: #e0e7ff; color: #3730a3; }
    .status-badge {
      display: inline-block; padding: .2em .6em; border-radius: 4px;
      font-size: .75rem; font-weight: 600; text-transform: capitalize;
    }
    @media (max-width: 768px) {
      .vendor-sidebar { display: none; }
      .vendor-main { padding: 1rem; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<div class="d-flex">
  <aside class="vendor-sidebar">
    <div class="brand"><i class="bi bi-calendar-check me-1"></i> AnyBooking</div>
    {% if vendor %}
    <div class="vendor-name"><i class="bi bi-shop me-1"></i> {{ vendor.name }}</div>
    {% endif %}
    <nav class="mt-2">
      <a href="{% url 'vendor_dashboard' %}" class="nav-link {% block nav_dashboard %}{% endblock %}">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
      <a href="{% url 'vendor_bookings' %}" class="nav-link {% block nav_bookings %}{% endblock %}">
        <i class="bi bi-calendar3"></i> Bookings
      </a>
    </nav>
    <div class="mt-auto p-3" style="position:absolute;bottom:0;width:100%;">
      <a href="{% url 'vendor_logout' %}" class="btn btn-sm btn-outline-secondary w-100">
        <i class="bi bi-box-arrow-right"></i> Sign out
      </a>
    </div>
  </aside>

  <main class="vendor-main">
    {% if messages %}
      {% for msg in messages %}
      <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show mb-3">
        {{ msg }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
